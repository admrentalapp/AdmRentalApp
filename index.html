<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#09090b" />
    <meta name="description" content="Gestão de manutenção e chamados para locação de equipamentos." />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ADM Manut." />
    <title>ADM Manutenção</title>
  </head>
  <body>
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('adm-theme')
          var theme = stored === 'light' || stored === 'dark' ? stored : 'dark'
          var root = document.documentElement
          root.classList.toggle('dark', theme === 'dark')
          root.style.colorScheme = theme
        } catch (e) {
          document.documentElement.classList.add('dark')
        }
      })()
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
